<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>인라인 이벤트  모델 1</title>
    <script>
        function greet() {
            alert('안녕하세요~ 온라인 이벤트 모델 2');
        }

        function addstar(btn){
            btn.textContent = '★';
        }

        function overChange(btn){
            btn.style.backgroundColor = 'magenta';
            btn.style.color = 'white';
        }
        function outChange(btn){
            btn.style.backgroundColor = 'lightgray';
            btn.style.color = 'black';
        }

        let count = 1;
        function changeImg(img){
            count++;
            if(count > 5){
                count = 1;
            }
            img.src = "imgs/im " + count + ".jpg";
        }
        function showImageSlide(){
            let img = document.getElementById("img2");
            setInterval(function(){
                count++;
                if(count > 5){
                    count = 1;
                }
                img.src = "imgs/im " + count + ".jpg";
            }, 2000);
        }
        
    </script>
</head>
<body>
    <button onclick="alert('온라인 이벤트 모델')">온라인 이벤트 모델</button><br><br>
    <button onclick="greet()">인사하기</button><br><br>
    <button onclick="addstar(this)">별 추가</button><br><br>
    <button onmouseover="overChange(this)" onmouseout="outChange(this)">배경 및 글자색 변경</button><br><br>
    <img src="imgs/im 1.jpg"width="400" height="300" onclick="changeImg(this)" style="cursor: pointer;"><br><br>
    <img src="imgs/im 1.jpg"width="400" height="300" id="img2">
